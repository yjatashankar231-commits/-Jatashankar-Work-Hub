<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jatashankar Work Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f7fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary: #1e3c72;
            --accent: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --border-radius: 12px;
            --shadow: 0 4px 8px rgba(0,0,0,0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 10px; display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 500px; padding-bottom: 30px; }
        .page { display: none; }
        .page.active { display: block; }

        .header {
            background: linear-gradient(135deg, var(--primary), #2a5298);
            color: white; padding: 18px; border-radius: var(--border-radius);
            box-shadow: var(--shadow); margin-bottom: 15px; position: relative;
        }
        .header h1 { margin: 0; font-size: 1.3rem; }
        .back-btn {
            position: absolute; top: 18px; right: 15px;
            background: rgba(255,255,255,0.25); color: white; border: none;
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        .section-title { font-size: 0.85rem; color: #7f8c8d; margin: 15px 0 10px 5px; font-weight: bold; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .menu-item {
            background: var(--card-bg); border: 1px solid #eef2f5; border-radius: var(--border-radius);
            padding: 15px 5px; display: flex; flex-direction: column; align-items: center;
            text-align: center; font-weight: 600; font-size: 0.9rem; box-shadow: var(--shadow); cursor: pointer;
        }
        .menu-item .icon { font-size: 1.8rem; margin-bottom: 5px; }

        .form-card { background: var(--card-bg); padding: 15px; border-radius: var(--border-radius); box-shadow: var(--shadow); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem;
        }
        
        .btn {
            width: 100%; padding: 12px; background: var(--accent); color: white;
            border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-success { background: var(--success); }
        .btn-half { width: 48%; display: inline-block; }
        .flex-btns { display: flex; justify-content: space-between; margin-top:15px; }

        .data-card { background: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--accent); box-shadow: var(--shadow); }
        .data-card h4 { margin: 0 0 5px 0; font-size: 1rem; color: var(--primary); }
        .data-card p { margin: 4px 0; font-size: 0.85rem; color: #444; }
        .delete-btn { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; margin-top: 5px; }
        
        /* Print Styles */
        @media print {
            .back-btn, .delete-btn, .flex-btns { display: none !important; }
            body { background: white; }
            .app-container { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div id="home" class="page active">
        <div class="header">
            <h1 style="display:flex; align-items:center; gap:10px;">
                <img src="assets/logo.png" width="45" height="45" style="border-radius:50%; object-fit: cover;" alt="Logo">
                Jatashankar Work Hub
            </h1>
        </div>

        <div class="section-title">Field Operations</div>
        <div class="grid">
            <div class="menu-item" onclick="nav('page-travel')"><span class="icon">🚗</span>Travel Entry</div>
            <div class="menu-item" onclick="nav('page-install')"><span class="icon">🛠</span>Installation</div>
            <div class="menu-item" onclick="nav('page-sr')"><span class="icon">🔧</span>SR Form</div>
            <div class="menu-item" onclick="nav('page-sr-closed')"><span class="icon">✅</span>SR Closed</div>
            <div class="menu-item" onclick="nav('page-visit')"><span class="icon">🏗</span>Site Visit</div>
            <div class="menu-item" onclick="nav('page-restore')"><span class="icon">♻️</span>Site Restore</div>
            <div class="menu-item" onclick="nav('page-other')"><span class="icon">📝</span>Other Work</div>
        </div>

        <div class="section-title">Database & Exports</div>
        <div class="grid">
            <div class="menu-item" style="grid-column: span 2;" onclick="loadHistory()"><span class="icon">📊</span>Daily Report & History</div>
        </div>
    </div>

    <div id="page-travel" class="page">
        <div class="header"><h1>🚗 Travel Entry</h1><button class="back-btn" onclick="nav('home')">Back</button></div>
        <div class="form-card">
            <form onsubmit="saveForm(event, 'Travel')">
                <div class="form-group"><label>From (Location A)</label><input type="text" id="t-from" required></div>
                <div class="form-group"><label>To (Location B)</label><input type="text" id="t-to" required></div>
                <button type="button" class="btn btn-success" style="padding: 8px; font-size: 0.85rem; margin-bottom: 10px;" onclick="simulateDistance()">🔄 Auto Calculate KM</button>
                <div class="form-group"><label>Total Distance (KM)</label><input type="number" id="t-km" placeholder
